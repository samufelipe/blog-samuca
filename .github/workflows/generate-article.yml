name: Gerar Artigo Automático

on:
  schedule:
    # Seg, Qua, Sex às 08:00 UTC (05:00 BRT)
    - cron: '0 8 * * 1,3,5'
  workflow_dispatch:
    inputs:
      topic:
        description: 'Tópico do artigo (deixe vazio para automático)'
        required: false
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Gerar artigo
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            npx tsx scripts/generate-article.ts "${{ github.event.inputs.topic }}"
          else
            npx tsx scripts/generate-article.ts
          fi

      - name: Verificar se há artigo novo
        id: check
        run: |
          git diff --quiet content/articles/ || echo "has_changes=true" >> $GITHUB_OUTPUT

      - name: Commit e push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add content/articles/
          git commit -m "feat: artigo automatico $(date +%Y-%m-%d)"
          git push
